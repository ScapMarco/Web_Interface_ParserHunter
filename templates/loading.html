<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParserHunter - Analyzing Binary</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .loading-card {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .progress {
            height: 25px;
            border-radius: 15px;
            margin: 25px 0;
            background-color: #e9ecef;
        }
        .progress-bar {
            background-color: #28a745;
            transition: width 0.8s ease-in-out;
        }
        .status-header {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .status-subtext {
            font-size: 0.9rem;
            color: #6c757d;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
            margin-bottom: 20px;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="loading-card">
        <div class="spinner-border" role="status">
            <span class="sr-only">Loading...</span>
        </div>
        <h4 class="status-header">Analyzing Binary</h4>
        <div class="progress">
            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 5%;"></div>
        </div>
        <div id="status-message" class="status-subtext">Initializing pipeline...</div>
    </div>

    <script>
        /**
         * Function to poll the /status endpoint.
         * Matches strings from app.py:
         * "Phase 1: Binary Deconstruction..."
         * "Phase 2: Semantic Graph Building..."
         * "Phase 3: Neural Network Classification..."
         */
        function checkStatus() {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    const message = data.message;
                    const progressBar = document.getElementById('progress-bar');
                    const statusText = document.getElementById('status-message');

                    // Update the visible text message
                    statusText.innerText = message;

                    // Update progress bar based on keywords in the message
                    if (message.includes("Phase 1")) {
                        progressBar.style.width = '33%';
                    } else if (message.includes("Phase 2")) {
                        progressBar.style.width = '66%';
                    } else if (message.includes("Phase 3")) {
                        progressBar.style.width = '95%';
                    }

                    // Handle completion or continue polling
                    if (data.status === 'complete') {
                        progressBar.style.width = '100%';
                        statusText.innerText = "Finalizing results...";
                        // Small delay before redirect so the user sees 100%
                        setTimeout(() => {
                            window.location.href = '/results';
                        }, 800);
                    } else {
                        // Poll every 1 second for higher responsiveness
                        setTimeout(checkStatus, 1000);
                    }
                })
                .catch(error => {
                    console.error('Error polling status:', error);
                    setTimeout(checkStatus, 2000);
                });
        }

        // Initialize polling on page load
        document.addEventListener('DOMContentLoaded', checkStatus);
    </script>
</body>
</html>
